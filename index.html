<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abhay Mangalmay Professional Tour Editor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&family=Mukta:wght@700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body { font-family: 'Poppins', sans-serif; display: flex; margin: 0; background: #f5f5f5; }
 .form { width: 40%; padding: 20px; background: white; height: 100vh; overflow-y: auto; box-shadow: 2px 0 5px #ccc; }
 .preview { width: 60%; padding: 20px; display: flex; justify-content: center; align-items: flex-start; overflow-y: auto; }
  h2 { color: #D32F2F; text-align: center; }
  label { font-weight: bold; margin-top: 10px; display: block; }
  input, textarea, select { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 2px solid #FF9800; border-radius: 8px; font-size: 15px; }
  button { width: 100%; padding: 15px; background: #D32F2F; color: white; border: none; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 10px; margin-top: 10px; }
  button:hover { background: #B71C1C; }
 .template-btn { background: #FF9800; margin: 5px; }

  /* POSTER DESIGN */
  #poster { width: 420px; background: #FFF8E1; border: 12px solid #FF9800; padding: 15px; position: relative; }
 .toran { text-align: center; font-size: 28px; }
 .title1 { text-align: center; color: #0D47A1; font-weight: 700; font-size: 14px; }
 .title2 { text-align: center; color: #D32F2F; font-size: 30px; font-weight: 900; font-family: 'Mukta'; }
 .banner { background: #0D47A1; color: white; padding: 10px; text-align: center; font-weight: 700; margin: 10px 0; font-size: 16px; }
 .photos { display: flex; justify-content: space-around; align-items: center; margin: 10px 0; }
 .photos img { width: 115px; height: 115px; border-radius: 15px; object-fit: cover; border: 4px solid white; box-shadow: 0 2px 5px #0003; }
 .bus-img { width: 100%; height: 130px; object-fit: cover; border-radius: 10px; margin: 10px 0; }
 .price { background: #B71C1C; color: white; text-align: center; padding: 15px; border-radius: 15px; font-size: 30px; font-weight: 900; font-family: 'Mukta'; }
 .list { columns: 2; padding: 10px; font-size: 15px; font-weight: 500; }
 .footer { text-align: center; font-size: 13px; margin-top: 10px; background: #E3F2FD; padding: 8px; border-radius: 8px; }
 .template2 { background: url('https://i.imgur.com/3wG2z8o.jpg') no-repeat center; background-size: cover; color: white; }
</style>
</head>
<body>

<div class="form">
  <h2>Abhay Mangalmay Tour Editor</h2>

  <label>Template Chuno:</label>
  <button class="template-btn" onclick="setTemplate(1)">Design 1: Bus Tour</button>
  <button class="template-btn" onclick="setTemplate(2)">Design 2: Mandir Tour</button>

  <label>Company Ka Naam:</label>
  <input type="text" id="companyName" value="ABHAY MANGALMAY TOUR" oninput="updatePoster()">

  <label>Company Ka Naam Hindi:</label>
  <input type="text" id="companyNameHi" value="अभय मंगलमय टूर" oninput="updatePoster()">

  <label>Tour Ka Title:</label>
  <input type="text" id="tourTitle" value="पवित्र तीर्थ यात्रा || गया जी यात्रा" oninput="updatePoster()">

  <label>Price ₹:</label>
  <input type="number" id="price" value="6000" oninput="updatePoster()">

  <label>Destination List -, se alag kare:</label>
  <textarea id="destinations" rows="4" oninput="updatePoster()">कालिजर, चित्रकूट, अयोध्या धाम, प्रयागराज, बनारस, मिर्जापुर, पुन, गया जी, बौद्ध गया, बासुकिनाथ</textarea>

  <label>Amenities List:</label>
  <textarea id="amenities" rows="3" oninput="updatePoster()">1. Bus 2. 3 Time Veg Bhojan 3. Nashta 4. Chai</textarea>

  <label>Contact Number:</label>
  <input type="text" id="contact" value="Contact: 98XXXXXXXX" oninput="updatePoster()">

  <label>Bus Photo Upload:</label>
  <input type="file" accept="image/*" onchange="loadImage(event, 'busImg')">

  <label>Tour Photo 1:</label>
  <input type="file" accept="image/*" onchange="loadImage(event, 'p1')">

  <label>Tour Photo 2:</label>
  <input type="file" accept="image/*" onchange="loadImage(event, 'p2')">

  <button onclick="downloadPoster()">📥 HD POSTER DOWNLOAD KARO</button>
</div>

<div class="preview">
  <div id="poster">
    <div class="toran" id="toran">🔔 🌸 🔔 🌸 🔔</div>
    <p style="text-align:center">ॐ || श्री गणेशाय नम: ||</p>
    <p class="title1" id="compEn">ABHAY MANGALMAY TOUR</p>
    <p class="title2" id="compHi">अभय मंगलमय टूर</p>
    <div class="banner" id="tourTitleText">पवित्र तीर्थ यात्रा || गया जी यात्रा</div>

    <div class="photos" id="photoSection">
      <img id="p1" src="https://placehold.co/115x115/FF9800/white?text=Photo1">
      <span style="font-size:45px">🔔</span>
      <img id="p2" src="https://placehold.co/115x115/FF9800/white?text=Photo2">
    </div>

    <img id="busImg" class="bus-img" src="https://placehold.co/400x130/0D47A1/white?text=Bus+Photo">

    <div class="price">कियारा मात्र ₹<span id="priceText">6000</span>/-</div>

    <div id="amenitySection" style="margin:10px 0; font-size:14px;"></div>
    <div class="list" id="destList"></div>

    <div class="footer" id="footerText">
      Contact: 98XXXXXXXX<br>
      Office: Sipra, Madhya Pradesh
    </div>
  </div>
</div>

<script>
let currentTemplate = 1;

function setTemplate(t){
  currentTemplate = t;
  let poster = document.getElementById('poster');
  if(t==2){
    poster.className = 'template2';
    document.getElementById('photoSection').style.display = 'none';
    document.getElementById('toran').innerText = '🛕 🛕 🛕';
  } else {
    poster.className = '';
    poster.style.background = '#FFF8E1';
    document.getElementById('photoSection').style.display = 'flex';
    document.getElementById('toran').innerText = '🔔 🌸 🔔 🌸 🔔';
  }
  updatePoster();
}

function updatePoster(){
  document.getElementById('compEn').innerText = document.getElementById('companyName').value;
  document.getElementById('compHi').innerText = document.getElementById('companyNameHi').value;
  document.getElementById('tourTitleText').innerText = document.getElementById('tourTitle').value;
  document.getElementById('priceText').innerText = document.getElementById('price').value;
  document.getElementById('footerText').innerText = document.getElementById('contact').value + "\nOffice: Sipra, Madhya Pradesh";

  let dest = document.getElementById('destinations').value.split(',');
  let listHTML = '';
  dest.forEach(d => { if(d.trim()!= '') listHTML += `🔸 ${d.trim()}<br>`; });
  document.getElementById('destList').innerHTML = listHTML;

  document.getElementById('amenitySection').innerText = document.getElementById('amenities').value;
}

function loadImage(event, id){
  const reader = new FileReader();
  reader.onload = function(){ document.getElementById(id).src = reader.result; }
  reader.readAsDataURL(event.target.files[0]);
}

function downloadPoster(){
  html2canvas(document.getElementById('poster'), {scale: 3, useCORS: true}).then(canvas => {
    let link = document.createElement('a');
    link.download = 'Abhay_Mangalmay_Poster.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
}

updatePoster();
</script>

</body>
</html>
