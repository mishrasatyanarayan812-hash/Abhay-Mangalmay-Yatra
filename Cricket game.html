<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Cricket - Made by Abhay Mishra</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(to bottom, #87CEEB, #228B22);
        font-family: 'Arial', sans-serif;
    }
    canvas {
        border: 4px solid #333;
        background: #32CD32;
        cursor: crosshair;
    }
    #ui {
        position: absolute;
        top: 10px;
        width: 400px;
        text-align: center;
        color: white;
        font-size: 18px;
        font-weight: bold;
        text-shadow: 2px 2px 3px #000;
    }
    #scoreBoard {
        position: absolute;
        bottom: 10px;
        left: 10px;
        color: white;
        font-size: 20px;
        font-weight: bold;
        text-shadow: 2px 2px 3px #000;
    }
    #legend {
        position: absolute;
        right: 20px;
        top: 80px;
        color: white;
        font-size: 14px;
        background: rgba(0,0,0,0.7);
        padding: 10px;
        border-radius: 8px;
    }
    #startScreen, #gameOverScreen {
        position: absolute;
        text-align: center;
        color: white;
        background: rgba(0,0,0,0.85);
        padding: 30px;
        border-radius: 15px;
        z-index: 10;
    }
    #startScreen h1 { font-size: 32px; color: #FFD700; }
    #gameOverScreen h1 { font-size: 32px; color: #FF0000; }
    .credit { font-size: 16px; color: #FFD700; margin-top: 10px; }
    button {
        margin-top: 15px;
        padding: 12px 25px;
        font-size: 18px;
        background: #FF4500;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
    }
    #celebration {
        position: absolute;
        font-size: 30px;
        color: gold;
        display: none;
        animation: party 0.8s infinite;
        z-index: 5;
    }
    @keyframes party { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }
</style>
</head>
<body>

<div id="ui">Runs: <span id="runs">0</span> | Balls: <span id="balls">0</span> | RR: <span id="rr">0.00</span></div>
<div id="scoreBoard">Total: 0</div>
<div id="legend">
    <b>Target Zones:</b><br>
    Top = 6 Runs<br>
    4 = 4 Runs<br
